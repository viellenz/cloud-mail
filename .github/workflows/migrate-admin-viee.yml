name: One-time migrate Cloud Mail admin to viee.me

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the administrator migration after a successful preflight
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Preflight or migrate administrator
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          EXPECTED_ADMIN: ${{ secrets.ADMIN }}
          APPLY: ${{ inputs.apply }}
        run: node .github/scripts/migrate-admin-viee.mjs
